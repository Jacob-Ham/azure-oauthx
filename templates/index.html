<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Token Automation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #1c1e20;
            --color-text: #e3dfd9;
            --color-text-secondary: #666;
            --color-border: #e5e5e5;
            --color-link: #0066cc;
            --color-link-hover: #0052a3;
            --color-accent: #4a9eff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 14px;
            color: var(--color-text-secondary);
            font-weight: 400;
            letter-spacing: 0.07em;
        }

        section {
            margin-bottom: 48px;
        }

        h2 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-text-secondary);
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--color-border);
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }

        select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--color-text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.1);
        }

        select {
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
        }

        button {
            display: block;
            width: 100%;
            padding: 14px 24px;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: #3a8eef;
        }

        button:active {
            transform: scale(0.98);
        }

        .url-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            word-break: break-all;
            margin-bottom: 24px;
        }

        .url-box a {
            color: var(--color-accent);
            text-decoration: none;
            font-size: 13px;
            font-family: 'Monaco', 'Consolas', monospace;
            word-break: break-all;
        }

        .url-box a:hover {
            text-decoration: underline;
        }

        .instruction {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .token-box {
            margin-bottom: 24px;
        }

        .token-box label {
            font-size: 12px;
            color: var(--color-accent);
            margin-bottom: 8px;
        }

        .token-box textarea {
            margin-bottom: 0;
            min-height: 200px;
        }

        .decode-box {
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
            position: relative;
        }

        .decode-box.visible {
            display: block;
        }

        .decode-content {
            margin: 0;
            padding-right: 60px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .code-block-wrapper {
            position: relative;
        }

        .code-block-wrapper textarea {
            width: 100%;
            display: block;
            margin-bottom: 8px;
        }

        .code-block-wrapper .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            margin: 0;
            padding: 3px 8px;
            font-size: 10px;
            display: inline-block;
            line-height: 1;
        }

        .decode-box .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            margin: 0;
            padding: 3px 8px;
            font-size: 10px;
            line-height: 1;
        }

        .decode-box.visible {
            display: block;
        }

        .decode-btn {
            width: auto;
            padding: 8px 16px;
            background: rgba(74, 158, 255, 0.2);
            font-size: 12px;
            display: inline-block;
            margin-left: 8px;
        }

        .decode-btn:hover {
            background: rgba(74, 158, 255, 0.3);
        }

        .decode-btn.decoded {
            background: rgba(255, 255, 255, 0.1);
        }

        .copy-btn {
            width: auto;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 12px;
            display: inline-block;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .token-info {
            display: flex;
            gap: 30px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .token-info div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .token-info label {
            margin: 0;
            font-size: 11px;
        }

        .token-info span {
            font-size: 14px;
            color: var(--color-text);
        }

        .error {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            color: #e94560;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }

        .checkbox-container {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .checkbox-inline {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .checkbox-inline input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: var(--color-accent);
        }

        .checkbox-inline label {
            margin: 0;
            font-size: 12px;
            font-weight: 400;
            text-transform: none;
            letter-spacing: normal;
            cursor: pointer;
            color: var(--color-text-secondary);
        }

        .collapsible {
            margin-bottom: 16px;
        }

        .collapsible-toggle {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--color-text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s ease;
        }

        .collapsible-toggle:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .collapsible-toggle::after {
            content: '▼';
            font-size: 10px;
            transition: transform 0.2s ease;
        }

        .collapsible-toggle.open::after {
            transform: rotate(180deg);
        }

        .collapsible-content {
            display: none;
            padding-top: 12px;
        }

        .collapsible-content.open {
            display: block;
        }

        .tooltip {
            position: relative;
        }

        .tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 1000;
            margin-bottom: 8px;
            max-width: 300px;
            white-space: normal;
            text-align: center;
            line-height: 1.4;
        }

        .tooltip:hover::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: rgba(0, 0, 0, 0.9);
            margin-bottom: -4px;
            z-index: 1000;
        }

        @media (max-width: 480px) {
            .container {
                padding: 48px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .token-info {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>OAuth Token Automation</h1>
            <p class="subtitle">Microsoft Identity Token Generator</p>
        </header>

        <section>
            <h2>1. Select Profile</h2>
            <div class="form-group">
                <label for="profile">Authentication Profile</label>
                <select id="profile">
                    {% for name, config in profiles.items() %}
                    <option value="{{ name }}">{{ name }} ({{ config.resource_name }})</option>
                    {% endfor %}
                </select>
                <div class="checkbox-container">
                    <div class="checkbox-inline tooltip" data-tooltip="Enable these if you're getting authorization errors using the JWT (usually if auto-authed via windows hello)">
                        <input type="checkbox" id="force-login">
                        <label for="force-login">Force re-auth</label>
                    </div>
                    <div class="checkbox-inline tooltip" data-tooltip="Enable these if you're getting authorization errors using the JWT (usually if auto-authed via windows hello)">
                        <input type="checkbox" id="require-mfa">
                        <label for="require-mfa">Require MFA</label>
                    </div>
                </div>
            </div>
            <button id="generate-btn">Generate Auth URL</button>
        </section>

        <section id="auth-section" class="hidden">
            <h2>2. Authorize</h2>
            <p class="instruction">Click the link below, sign in, then immediately copy the URL from the browser address bar before it redirects.</p>
            <div class="collapsible">
                <button class="collapsible-toggle" id="pkce-toggle">Show challenge & verifier</button>
                <div class="collapsible-content" id="pkce-content">
                    <div class="form-group" style="margin-bottom: 12px;">
                        <label>PKCE Code Verifier</label>
                        <div class="code-block-wrapper">
                            <div id="code-verifier" class="url-box" style="font-family: 'Monaco', 'Consolas', monospace; font-size: 11px; margin-bottom: 0;"></div>
                            <button class="copy-btn" data-target="code-verifier">Copy</button>
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>PKCE Code Challenge</label>
                        <div class="code-block-wrapper">
                            <div id="code-challenge" class="url-box" style="font-family: 'Monaco', 'Consolas', monospace; font-size: 11px; margin-bottom: 0;"></div>
                            <button class="copy-btn" data-target="code-challenge">Copy</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="code-block-wrapper">
                <div class="url-box">
                    <a id="auth-url" href="#" target="_blank"></a>
                </div>
                <button class="copy-btn" data-target="auth-url">Copy</button>
            </div>
        </section>

        <section id="exchange-section" class="hidden">
            <h2>3. Exchange Token</h2>
            <p class="instruction">Paste the full URL from your browser here.</p>
            <div class="form-group">
                <textarea id="callback-url" placeholder="https://login.microsoftonline.com/common/wrongplace#code=..."></textarea>
            </div>
            <button id="exchange-btn">Exchange for Tokens</button>
        </section>

        <section id="results-section" class="hidden">
            <h2>4. Tokens</h2>
            
            <div class="token-box">
                <label>Access Token</label>
                <div class="code-block-wrapper">
                    <textarea id="access-token" readonly></textarea>
                    <button class="copy-btn" data-target="access-token">Copy</button>
                </div>
                <button class="decode-btn" data-target="access-token" data-result="access-token-decoded">Decode JWT</button>
                <div id="access-token-decoded" class="decode-box">
                    <pre class="decode-content"></pre>
                    <button class="copy-btn decode-copy">Copy</button>
                </div>
            </div>

            <div class="token-box">
                <label>Refresh Token</label>
                <div class="code-block-wrapper">
                    <textarea id="refresh-token" readonly></textarea>
                    <button class="copy-btn" data-target="refresh-token">Copy</button>
                </div>
            </div>
            
            <div class="token-info">
                <div>
                    <label>Expires In</label>
                    <span id="expires-in"></span>
                </div>
                <div>
                    <label>Token Type</label>
                    <span id="token-type"></span>
                </div>
            </div>
        </section>

        <div id="error" class="error hidden"></div>
    </div>

    <script>
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const profile = document.getElementById('profile').value;
            const forceLogin = document.getElementById('force-login').checked;
            const requireMfa = document.getElementById('require-mfa').checked;
            
            try {
                const response = await fetch('/generate-url', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        profile: profile,
                        force_login: forceLogin,
                        require_mfa: requireMfa
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                const authUrl = document.getElementById('auth-url');
                authUrl.href = data.auth_url;
                authUrl.textContent = data.auth_url;
                
                document.getElementById('code-verifier').textContent = data.code_verifier;
                document.getElementById('code-challenge').textContent = data.code_challenge;
                
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('exchange-section').classList.remove('hidden');
                hideError();
            } catch (err) {
                showError('Failed to generate URL: ' + err.message);
            }
        });

        document.getElementById('exchange-btn').addEventListener('click', async () => {
            const callbackUrl = document.getElementById('callback-url').value.trim();
            
            if (!callbackUrl) {
                showError('Please paste the callback URL');
                return;
            }
            
            try {
                const response = await fetch('/exchange', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({callback_url: callbackUrl})
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                document.getElementById('access-token').value = data.access_token || '';
                document.getElementById('refresh-token').value = data.refresh_token || '';
                document.getElementById('expires-in').textContent = data.expires_in || '';
                document.getElementById('token-type').textContent = data.token_type || '';
                
                document.getElementById('results-section').classList.remove('hidden');
                hideError();
            } catch (err) {
                showError('Failed to exchange tokens: ' + err.message);
            }
        });

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.target);
                let textToCopy;
                if (target.tagName === 'TEXTAREA' || target.tagName === 'INPUT') {
                    textToCopy = target.value;
                } else if (target.tagName === 'A') {
                    textToCopy = target.href;
                } else {
                    textToCopy = target.textContent;
                }
                navigator.clipboard.writeText(textToCopy).then(() => {
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = 'Copy', 2000);
                });
            });
        });

        function showError(msg) {
            const errDiv = document.getElementById('error');
            errDiv.textContent = msg;
            errDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error').classList.add('hidden');
        }

        function decodeJWT(token) {
            try {
                const parts = token.split('.');
                if (parts.length !== 3) {
                    return 'Not a valid JWT format (expected 3 parts)';
                }
                const header = JSON.parse(atob(parts[0].replace(/-/g, '+').replace(/_/g, '/')));
                const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
                return JSON.stringify({header, payload}, null, 2);
            } catch (e) {
                return 'Failed to decode: ' + e.message;
            }
        }

        document.querySelectorAll('.decode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.target);
                const resultBox = document.getElementById(btn.dataset.result);
                const token = target.value.trim();
                if (!token) return;
                if (btn.classList.contains('decoded')) {
                    resultBox.classList.remove('visible');
                    btn.classList.remove('decoded');
                    btn.textContent = 'Decode JWT';
                } else {
                    const content = resultBox.querySelector('.decode-content');
                    content.textContent = decodeJWT(token);
                    resultBox.classList.add('visible');
                    btn.classList.add('decoded');
                    btn.textContent = 'Hide Decoded';
                }
            });
        });

        document.querySelectorAll('.decode-copy').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const decodeBox = btn.closest('.decode-box');
                const content = decodeBox.querySelector('.decode-content');
                navigator.clipboard.writeText(content.textContent).then(() => {
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = 'Copy', 2000);
                });
            });
        });

        document.getElementById('pkce-toggle').addEventListener('click', () => {
            const toggle = document.getElementById('pkce-toggle');
            const content = document.getElementById('pkce-content');
            toggle.classList.toggle('open');
            content.classList.toggle('open');
            toggle.textContent = content.classList.contains('open') ? 'Hide challenge & verifier' : 'Show challenge & verifier';
        });
    </script>
</body>
</html>
